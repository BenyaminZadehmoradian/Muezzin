<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="script-src 'self'; style-src 'self' 'unsafe-inline'">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="../../node_modules/bootstrap/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="../../node_modules/bootstrap/dist/js/bootstrap.min.js"></script>
    <link href="../../ressources/fonts/FontAwesome/all.min.css" rel="stylesheet">
    <link href="quran.css" rel="stylesheet">
    <script src="quran.js"></script>
    <title>Muezzin - Quran</title>
  </head>

  <header>
    <h1 id="title">Quran</h1>
    <div id="surahSelector">
      <button class="btn btn-dark quranButton" id="previousSurah">Previous</button>
      <select class="form-control" id="chaptersList"></select>
      <button class="btn btn-dark quranButton" id="nextSurah">Next</button>
    </div>
  </header>

  <body class="d-flex flex-column min-vh-100" style="background-color:#141414;">

    <div id="reader">
      <div class="bismillah">U</div>
    </div>

  </body>

  <footer>
    <div id="audioControls">
      <button type="button" id="stopB" class="btn btn-dark"><i class="fa fa-stop"></i></button>
      <button type="button" id="playB" class="btn btn-dark"><i class="fa fa-play"></i></button>
      <div id="volume">
        <i class="fa fa-volume-down"></i>
        <input type="range" class="form-range" id="volSlider">
        <i class="fa fa-volume-up"></i>
      </div>
      <div id="playModeSelector" class="btn-group btn-group-sm" role="group" dir="rtl">
        <input type="radio" class="btn-check" name="playMode" id="modeBoth" value="both" autocomplete="off">
        <label class="btn btn-outline-secondary" for="modeBoth">Arabic + Trans</label>
        <input type="radio" class="btn-check" name="playMode" id="modeTranslation" value="translation" autocomplete="off">
        <label class="btn btn-outline-secondary" for="modeTranslation">Translation</label>
        <input type="radio" class="btn-check" name="playMode" id="modeArabic" value="arabic" autocomplete="off" checked>
        <label class="btn btn-outline-secondary" for="modeArabic">Arabic</label>
      </div>
    </div>
    <div id="buttonContainer">
      <button class="btn btn-dark" id="toTheTop"><i class="fa-solid fa-angles-up"></i></button>
      <button class="btn btn-dark" id="settings"><i class="fa-solid fa-gear"></i> Settings</button>
      <button class="btn btn-dark" id="return"><i class="fa fa-arrow-circle-right"></i> Return</button>
    </div>
  </footer>
</html>
